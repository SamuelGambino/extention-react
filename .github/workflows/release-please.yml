name: release-please

on:
  push:
    branches:
      - main 

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build-and-upload-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      # Автоматическая отправка dist/firefox на подпись в Mozilla AMO
      - name: Sign Firefox Extension (Self-Hosted)
        id: sign-firefox
        uses: whatsandoff/webext-build-and-publish@v1
        with:
          action: sign
          source-folder: dist/firefox
          addon-id: 'product-parser@samuelgambino.com'
          api-key: ${{ secrets.MOZILLA_API_KEY }}
          api-secret: ${{ secrets.MOZILLA_API_SECRET }}

      # Упаковка Chrome
      - name: Create Chrome Zip Archive
        run: |
          cd dist/chrome
          zip -r ../../ProductParser-Chrome-${{ needs.release-please.outputs.tag_name }}.zip .
          cd ../..

      # Загрузка готовых файлов в GitHub Release
      - name: Upload Assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Загружаем ZIP для Chrome
          gh release upload ${{ needs.release-please.outputs.tag_name }} ProductParser-Chrome-${{ needs.release-please.outputs.tag_name }}.zip --clobber
          
          # Загружаем подписанный .xpi для Firefox (экшен сам сохраняет путь к нему в свои outputs)
          gh release upload ${{ needs.release-please.outputs.tag_name }} ${{ steps.sign-firefox.outputs.extensions-xpi-path }} --clobber