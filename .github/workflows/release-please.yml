name: release-please

on:
  push:
    branches:
      - main 

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node

  build-and-upload-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Сборка проекта (создает dist/chrome и dist/firefox)
      - name: Build extension
        run: npm run build

      # Подпись Firefox-версии через web-ext
      - name: Sign Firefox Extension via web-ext
        env:
          AMO_JWT_ISSUER: ${{ secrets.MOZILLA_API_KEY }}
          AMO_JWT_SECRET: ${{ secrets.MOZILLA_API_SECRET }}
        run: |
          # Устанавливаем web-ext локально внутри экшена
          npx web-ext sign \
            --source-dir dist/firefox \
            --artifacts-dir dist/firefox-signed \
            --channel unlisted \
            --api-key=$AMO_JWT_ISSUER \
            --api-secret=$AMO_JWT_SECRET

      # Упаковка Chrome в ZIP
      - name: Create Chrome Zip Archive
        run: |
          cd dist/chrome
          zip -r ../../ProductParser-Chrome-${{ needs.release-please.outputs.tag_name }}.zip .
          cd ../..

      # Загрузка готовых файлов (ZIP для Chrome и сгенерированный .xpi для Firefox) в GitHub Release
      - name: Upload Assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ needs.release-please.outputs.tag_name }} ProductParser-Chrome-${{ needs.release-please.outputs.tag_name }}.zip --clobber
          gh release upload ${{ needs.release-please.outputs.tag_name }} dist/firefox-signed/*.xpi --clobber